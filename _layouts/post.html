---
layout: default
---
<article class="container" id="main">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <span>📅 {{ page.date | date: "%B %Y" }}</span>
      <span>⏱️ {{ content | number_of_words | divided_by: 200 }} min read</span>
    </div>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
