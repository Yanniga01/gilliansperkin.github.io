title: SmartGuideHubs
description: Independent software reviews
url: https://smartguidehubs.com
plugins:
  - jekyll-paginate-v2

pagination:
  enabled: true
  per_page: 12
  permalink: '/page/:num/'
  sort_field: 'date'
  sort_reverse: true

autopages:
  enabled: true
  categories:
    enabled: true
    layouts:
      - 'autopage_category.html'
    permalink: '/categories/:cat'
